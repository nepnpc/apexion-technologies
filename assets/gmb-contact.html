<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; background: #2563eb; font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
.wrap {
  width: 1080px;
  height: 1080px;
  background: #2563eb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px;
  position: relative;
  overflow: hidden;
}
.bg-circle-1 {
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: #fff;
  opacity: 0.05;
}
.bg-circle-2 {
  position: absolute;
  bottom: -80px; left: -80px;
  width: 350px; height: 350px;
  border-radius: 50%;
  background: #fff;
  opacity: 0.04;
}
.logo-mark {
  width: 72px; height: 72px;
  background: rgba(255,255,255,0.12);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  border: 1px solid rgba(255,255,255,0.2);
  position: relative;
  z-index: 2;
}
.logo-mark svg { width: 38px; height: 38px; }
h1 {
  font-size: 58px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.04em;
  line-height: 1.05;
  margin-bottom: 20px;
  position: relative;
  z-index: 2;
}
.sub {
  font-size: 20px;
  color: rgba(255,255,255,0.65);
  font-weight: 600;
  margin-bottom: 72px;
  position: relative;
  z-index: 2;
}
.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 520px;
  position: relative;
  z-index: 2;
}
.contact-item {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 24px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.contact-icon {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.contact-icon svg { width: 22px; height: 22px; }
.contact-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.contact-val {
  font-size: 18px;
  color: #fff;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.tagline {
  margin-top: 56px;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  position: relative;
  z-index: 2;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 4 19h4l4-9 4 9h4L12 3Z" fill="#fff"/></svg>
  </div>

  <h1>Let's build<br>something.</h1>
  <p class="sub">Free consultation. Reply within 24 hours.</p>

  <div class="contact-items">
    <div class="contact-item">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#fff"><path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.64.07-.3-.15-1.26-.46-2.39-1.47-.88-.79-1.48-1.76-1.65-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.21-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.07 2.88 1.22 3.08.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.7.63.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.7.25-1.29.17-1.42-.07-.13-.27-.2-.57-.35M12.05 21.79h-.01a9.87 9.87 0 0 1-5.03-1.38l-.36-.21-3.74.98 1-3.65-.24-.37a9.86 9.86 0 0 1-1.51-5.26c0-5.45 4.44-9.88 9.9-9.88a9.83 9.83 0 0 1 7 2.9 9.83 9.83 0 0 1 2.89 7c0 5.45-4.44 9.88-9.9 9.88m8.42-18.3A11.82 11.82 0 0 0 12.05 0C5.5 0 .16 5.33.16 11.89c0 2.1.55 4.14 1.59 5.94L.07 24l6.32-1.65a11.9 11.9 0 0 0 5.66 1.44h.01c6.55 0 11.89-5.33 11.89-11.89 0-3.18-1.24-6.16-3.48-8.41"/></svg>
      </div>
      <div>
        <div class="contact-label">WhatsApp</div>
        <div class="contact-val">+977 9703901454</div>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M16.72 6.5A9 9 0 1 1 12 3"/></svg>
      </div>
      <div>
        <div class="contact-label">Website</div>
        <div class="contact-val">apexionlabs.tech</div>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div>
        <div class="contact-label">Location</div>
        <div class="contact-val">Kathmandu, Nepal</div>
      </div>
    </div>
  </div>

  <div class="tagline">Apexion Technologies · Built in Nepal</div>
</div>
</body>
</html>
